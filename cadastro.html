<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADMIV - Cadastro Corporativo</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 30px; text-align: center; }
        .form-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 500px; text-align: left; }
        h2 { color: #2c3e50; text-align: center; }
        label { font-weight: bold; display: block; margin-top: 10px; color: #34495e; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #bdc3c7; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { background-color: #2980b9; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; font-size: 16px; margin-top: 20px; cursor: pointer; }
        .btn-submit:hover { background-color: #2471a3; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Cadastro de Usuário CADMIV</h2>
        <form>
            <label>Nome Completo:</label>
            <input type="text" placeholder="Digite seu nome">

            <label>E-mail:</label>
            <input type="email" placeholder="Digite seu e-mail">

            <label>CEP:</label>
            <input type="text" placeholder="00000-000">

            <label>Logradouro (Rua/Avenida):</label>
            <input type="text" placeholder="Nome da rua">

            <label>Número:</label>
            <input type="text" placeholder="Nº">

            <label>Bairro:</label>
            <input type="text" placeholder="Nome do bairro">

            <label>Cidade:</label>
            <input type="text" placeholder="Nome da cidade">

            <label>Estado:</label>
            <input type="text" placeholder="UF">

            <button type="button" class="btn-submit">Salvar Cadastro Completo</button>
        </form>
    </div>
</body>
</html>
